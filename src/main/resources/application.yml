jwt:
  secret: ${JWT_SECRET:very-long-secret-key-at-least-32-chars-long-for-hs256-algorithm}
  expiration: 86400000       # 24h
  refresh-expiration: 604800000  # 7 days

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  reset-password-expiry-minutes: 30

logging:
  level:
    com.perfectmarket: DEBUG
    org.springframework.security: INFO
