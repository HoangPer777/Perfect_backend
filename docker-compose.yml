services:
  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://db:5432/perfect_market
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key-at-least-32-chars}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-placeholder}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-placeholder}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-placeholder}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-placeholder}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-noreply@perfectmarket.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - perfect-network

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=perfect_market
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d perfect_market"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - perfect-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - perfect-network

networks:
  perfect-network:
    driver: bridge

volumes:
  pgdata: